<!DOCTYPE html>
<html lang="es" manifest="cache.manifest">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="iLegacy">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/564/564419.png">

<title>iLegacy OS v8 Lite</title>

<style>
* { -webkit-tap-highlight-color: rgba(0,0,0,0); box-sizing: border-box; }

body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: Helvetica, Arial, sans-serif;
}

/* GPU BOOST */
.main-container, .app-grid, .dock {
    -webkit-transform: translateZ(0);
}

/* Fondo ligero */
.main-container {
    width: 100%; height: 100%;
    background: #1a1a1a url('https://i.imgur.com/8Km9tLL.jpg') no-repeat center center;
    background-size: cover;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-direction: column;
    flex-direction: column;
}

/* Header */
.header {
    text-align: center;
    padding-top: 50px;
    color: white;
}

#clock {
    font-size: 80px;
    font-weight: 200;
    margin: 0;
}

#date {
    font-size: 16px;
    opacity: 0.8;
}

/* Apps */
.app-grid {
    -webkit-flex: 1;
    flex: 1;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
    -webkit-justify-content: center;
    justify-content: center;
    padding: 10px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

.icon-card {
    width: 90px;
    margin: 10px;
    text-align: center;
    text-decoration: none;
    color: white;
}

.icon-card img {
    width: 60px;
    height: 60px;
    border-radius: 14px;
    margin-bottom: 5px;
}

.icon-card span {
    font-size: 11px;
}

.icon-card:active {
    opacity: 0.5;
    -webkit-transform: scale(0.95);
}

/* Dock compatible iOS 9 */
.dock {
    background: rgba(30,30,30,0.85);
    margin: 10px;
    padding: 10px;
    border-radius: 20px;
    display: -webkit-flex;
    display: flex;
    -webkit-justify-content: space-around;
    justify-content: space-around;
}

/* Low RAM */
.low-ram .icon-card img {
    display: none;
}
</style>
</head>

<body>

<div class="main-container">

    <div class="header">
        <div id="clock">00:00</div>
        <div id="date">...</div>
    </div>

    <div class="app-grid">

        <a href="https://mbasic.facebook.com" class="icon-card">
            <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png">
            <span>FB Lite</span>
        </a>

        <a href="https://m.youtube.com/?app=m" class="icon-card">
            <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
            <span>YouTube</span>
        </a>

        <a href="https://baize.ai/chat" class="icon-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg">
            <span>AI Chat</span>
        </a>

        <a href="https://web.telegram.org/?legacy=1" class="icon-card">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
            <span>Telegram</span>
        </a>

        <a href="https://mail.google.com/mail/u/0/h/" class="icon-card">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968534.png">
            <span>Gmail Lite</span>
        </a>

        <a href="https://www.google.com/maps?force=lite" class="icon-card">
            <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png">
            <span>Maps</span>
        </a>

        <a href="https://www.retrogames.cc/" class="icon-card">
            <img src="https://cdn-icons-png.flaticon.com/512/686/686589.png">
            <span>Games</span>
        </a>

        <a href="https://radio.garden" class="icon-card">
            <img src="https://cdn-icons-png.flaticon.com/512/2301/2301145.png">
            <span>Radio</span>
        </a>

        <!-- MODO LITE -->
        <a href="#" onclick="liteMode()" class="icon-card">
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
            <span>Lite Mode</span>
        </a>

    </div>

    <div class="dock">
        <a href="https://www.google.com/search?gbv=1" class="icon-card">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
            <span>Google</span>
        </a>

        <a href="https://wa.me/" class="icon-card">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
            <span>WhatsApp</span>
        </a>
    </div>

</div>

<script>
// RELOJ
function updateTime() {
    var now = new Date();
    var h = now.getHours(), m = now.getMinutes();
    if (h < 10) h = "0" + h;
    if (m < 10) m = "0" + m;

    document.getElementById('clock').innerHTML = h + ":" + m;

    var days = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    var months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

    document.getElementById('date').innerHTML =
        days[now.getDay()] + ", " + now.getDate() + " de " + months[now.getMonth()];
}
setInterval(updateTime, 1000);
updateTime();

// STANDALONE FIX
(function(a, b, c) {
    if (c in b && b[c]) {
        var d, e = a.location, f = /^(a|html)$/i;
        a.addEventListener("click", function(a) {
            d = a.target;
            while (!f.test(d.nodeName)) d = d.parentNode;
            if ("href" in d && (d.href.indexOf("http") || ~d.href.indexOf(e.host))) {
                a.preventDefault();
                e.href = d.href;
            }
        }, false);
    }
})(document, window.navigator, "standalone");

// LOW RAM DETECTOR
if (navigator.deviceMemory && navigator.deviceMemory < 1) {
    document.body.className += " low-ram";
}

// LITE MODE
function liteMode(){
    document.body.style.background = "#000";
    var imgs = document.getElementsByTagName("img");
    for(var i=0;i<imgs.length;i++){
        imgs[i].style.display = "none";
    }
}

// CLASSLIST FIX
if (!("classList" in document.documentElement)) {
    Object.defineProperty(Element.prototype, 'classList', {
        get: function() {
            var self = this;
            function update(fn) {
                return function(value) {
                    var classes = self.className.split(/\s+/),
                        index = classes.indexOf(value);
                    fn(classes, index, value);
                    self.className = classes.join(" ");
                }
            }
            return {
                add: update(function(classes, index, value) {
                    if (!~index) classes.push(value);
                }),
                remove: update(function(classes, index) {
                    if (~index) classes.splice(index, 1);
                })
            };
        }
    });
}
</script>

</body>
</html>
