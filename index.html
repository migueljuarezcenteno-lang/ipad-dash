<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Stable</title>

<style>
body{
margin:0;
background:#000;
color:#0f0;
font-family:Arial;
}

.header{
padding:10px;
text-align:center;
border-bottom:1px solid #0f0;
}

input,button{
width:100%;
padding:10px;
background:#000;
color:#0f0;
border:1px solid #0f0;
margin-top:5px;
}

iframe{
width:100%;
height:220px;
border:0;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">YouTube Estable</div>

<input id="videoId" placeholder="Pega ID del video (ej: dQw4w9WgXcQ)">
<button onclick="play()">Reproducir</button>

<iframe id="player"></iframe>

<script>
function play(){
var id=document.getElementById("videoId").value;
if(!id) return;

/* SOLO EMBED (ESTABLE) */
document.getElementById("player").src =
"https://www.youtube.com/embed/"+id;
}
</script>

</body>
</html>
