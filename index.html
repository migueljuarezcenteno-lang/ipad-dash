<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>iLegacy Ultra PRO v15</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#0f0;
font-size:14px;
}

.header{
text-align:center;
padding:10px;
border-bottom:1px solid #0f0;
}

.menu div{
padding:15px;
border-bottom:1px solid #033;
}

.screen{
display:none;
padding:10px;
}

.active{
display:block;
}

input{
width:100%;
padding:10px;
background:#000;
color:#0f0;
border:1px solid #0f0;
}

button{
margin-top:5px;
padding:10px;
background:#000;
color:#0f0;
border:1px solid #0f0;
width:100%;
}

.item{
padding:10px;
border-bottom:1px solid #033;
}
</style>
</head>

<body>

<div class="header" id="clock">--:--</div>

<!-- HOME -->
<div id="home" class="active">

<div class="menu">
<div onclick="openApp('yt')">📺 YouTube Ultra</div>
<div onclick="goMaps()">📍 Maps</div>

<div>
🌐 Navegador
<input id="q" placeholder="Buscar o URL">
<button onclick="goSearch()">Buscar</button>
</div>

</div>
</div>

<!-- YOUTUBE -->
<div id="yt" class="screen">
<button onclick="home()">← Volver</button>

<h3>YouTube Ultra Lite</h3>

<input id="ytSearch" placeholder="Buscar videos">
<button onclick="searchYT()">Buscar</button>

<p style="font-size:12px;color:#888;">
Modo optimizado para iPad antiguo (sin cargas pesadas)
</p>

</div>

<script>

/* reloj */
setInterval(function(){
var d=new Date();
document.getElementById("clock").innerHTML=
d.getHours()+":"+("0"+d.getMinutes()).slice(-2);
},1000);

/* navegación */
function openApp(id){
document.getElementById("home").style.display="none";
document.getElementById(id).style.display="block";
}

function home(){
document.getElementById("home").style.display="block";
document.getElementById("yt").style.display="none";
}

/* MAPS (modo ligero) */
function goMaps(){
location.href="https://www.google.com/maps?force=lite";
}

/* NAVEGADOR */
function goSearch(){
var q=document.getElementById("q").value;
if(!q) return;

var isURL = q.indexOf(".")>-1;

var url = isURL 
? (q.indexOf("http")===0?q:"https://"+q)
: "https://www.google.com/search?gbv=1&q="+encodeURIComponent(q);

location.href=url;
}

/* YOUTUBE ULTRA PRO (SIN AJAX - COMPATIBLE iOS 9) */
function searchYT(){
var q=document.getElementById("ytSearch").value;
if(!q) return;

/* versión móvil ligera */
var url = "https://m.youtube.com/results?search_query="+encodeURIComponent(q);

/* redirección directa (sin cuelgues) */
location.href = url;
}

</script>

</body>
</html>
