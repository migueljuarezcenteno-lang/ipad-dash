<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">

<title>YouTube Turbo Stable</title>

<style>
body{
background:#000;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
font-family:Arial;
}

.loader{
color:#ff0000;
font-size:14px;
}
</style>

<!-- PRECONEXIÓN -->
<link rel="dns-prefetch" href="https://m.youtube.com">
<link rel="preconnect" href="https://m.youtube.com">

</head>

<body>

<div class="loader">Iniciando YouTube estable...</div>

<script>

/* 🚀 URL CON MODO ANTIGUO */
var ytUrl = "https://m.youtube.com/?persist_app=1&app=m&disable_polymer=1";

/* REDIRECCIÓN */
setTimeout(function(){
window.location.replace(ytUrl);
}, 50);

/* MODO APP */
(function(a, b, c) {
if (c in b && b[c]) {
var d, e = a.location, f = /^(a|html)$/i;
a.addEventListener("click", function(a) {
d = a.target;
while (!f.test(d.nodeName)) d = d.parentNode;
if ("href" in d && (d.href.indexOf("http") || ~d.href.indexOf(e.host))) {
a.preventDefault();
e.href = d.href;
}
}, false);
}
})(document, window.navigator, "standalone");

/* BLOQUEAR BACK */
history.pushState(null, null, location.href);
window.onpopstate = function () {
history.go(1);
};

</script>

</body>
</html>
