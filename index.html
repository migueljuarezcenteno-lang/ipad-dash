<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>iLegacy OS v10</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#0f0;
font-size:14px;
}

/* ultra simple */
.header{
padding:5px;
border-bottom:1px solid #0f0;
text-align:center;
}

.menu div{
padding:10px;
border-bottom:1px solid #033;
}

.screen{
display:none;
padding:10px;
}

.active{
display:block;
}

input, textarea{
width:100%;
background:#000;
color:#0f0;
border:1px solid #0f0;
padding:5px;
}

button{
background:#000;
color:#0f0;
border:1px solid #0f0;
padding:5px;
margin-top:5px;
}
</style>
</head>

<body>

<div class="header" id="clock">--:--</div>

<!-- HOME -->
<div id="home" class="active">
<div class="menu">

<div onclick="openApp('files')">📂 Archivos</div>
<div onclick="openApp('music')">🎵 Música</div>
<div onclick="openApp('yt')">📺 YouTube</div>
<div onclick="openApp('msg')">💬 Mensajes</div>
<div onclick="openApp('notes')">📝 Notas</div>
<div onclick="openApp('browser')">🌐 Navegador</div>

</div>
</div>

<!-- FILES -->
<div id="files" class="screen">
<button onclick="home()">←</button>
<h3>Archivos</h3>

<input id="fileName" placeholder="nombre">
<textarea id="fileContent" placeholder="contenido"></textarea>
<button onclick="saveFile()">Guardar</button>

<div id="fileList"></div>
</div>

<!-- MUSIC -->
<div id="music" class="screen">
<button onclick="home()">←</button>
<h3>Música</h3>

<div onclick="play(0)">▶ Track 1</div>
<div onclick="play(1)">▶ Track 2</div>

<audio id="player" controls></audio>
</div>

<!-- YOUTUBE -->
<div id="yt" class="screen">
<button onclick="home()">←</button>
<h3>YouTube Lite</h3>

<input id="ytSearch" placeholder="buscar">
<button onclick="ytGo()">Buscar</button>

<div id="ytResults"></div>
</div>

<!-- MENSAJES -->
<div id="msg" class="screen">
<button onclick="home()">←</button>
<h3>Mensajes Offline</h3>

<input id="msgInput">
<button onclick="sendMsg()">Enviar</button>

<div id="chat"></div>
</div>

<!-- NOTES -->
<div id="notes" class="screen">
<button onclick="home()">←</button>
<h3>Notas</h3>

<textarea id="note"></textarea>
<button onclick="saveNote()">Guardar</button>
</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<button onclick="home()">←</button>
<h3>Navegador Lite</h3>

<input id="url">
<button onclick="go()">Ir</button>
</div>

<script>

/* reloj */
setInterval(function(){
var d=new Date();
document.getElementById("clock").innerHTML=
d.getHours()+":"+("0"+d.getMinutes()).slice(-2);
},1000);

/* navegación */
function openApp(id){
var s=document.getElementsByClassName("screen");
for(var i=0;i<s.length;i++) s[i].style.display="none";
document.getElementById("home").style.display="none";
document.getElementById(id).style.display="block";
}

function home(){
var s=document.getElementsByClassName("screen");
for(var i=0;i<s.length;i++) s[i].style.display="none";
document.getElementById("home").style.display="block";
}

/* FILES (localStorage tipo sistema) */
function saveFile(){
var name=document.getElementById("fileName").value;
var content=document.getElementById("fileContent").value;
localStorage.setItem("file_"+name,content);
loadFiles();
}

function loadFiles(){
var list="";
for(var i in localStorage){
if(i.indexOf("file_")==0){
list+="<div onclick='openFile(\""+i+"\")'>"+i.replace("file_","")+"</div>";
}
}
document.getElementById("fileList").innerHTML=list;
}

function openFile(key){
document.getElementById("fileName").value=key.replace("file_","");
document.getElementById("fileContent").value=localStorage.getItem(key);
}

loadFiles();

/* MUSIC */
var tracks=[
"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
];

function play(i){
document.getElementById("player").src=tracks[i];
}

/* YOUTUBE SIMULADO */
function ytGo(){
var q=document.getElementById("ytSearch").value;
var url="https://www.youtube.com/results?search_query="+q;
document.getElementById("ytResults").innerHTML=
"<a href='"+url+"'>Ver resultados</a>";
}

/* MENSAJES OFFLINE */
function sendMsg(){
var msg=document.getElementById("msgInput").value;
var chat=document.getElementById("chat");
chat.innerHTML+="<div>> "+msg+"</div>";
localStorage.setItem("chat",chat.innerHTML);
}

document.getElementById("chat").innerHTML=localStorage.getItem("chat")||"";

/* NOTAS */
function saveNote(){
localStorage.setItem("note",document.getElementById("note").value);
}
document.getElementById("note").value=localStorage.getItem("note")||"";

/* BROWSER */
function go(){
var url=document.getElementById("url").value;
if(url.indexOf("http")!==0){
url="https://www.google.com/search?gbv=1&q="+url;
}
location.href=url;
}

</script>

</body>
</html>
