<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>iLegacy Ultra PRO v16</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#0f0;
font-size:14px;
}

.header{
text-align:center;
padding:10px;
border-bottom:1px solid #0f0;
}

.menu div{
padding:15px;
border-bottom:1px solid #033;
}

.screen{
display:none;
padding:10px;
}

.active{
display:block;
}

input, button{
width:100%;
padding:10px;
background:#000;
color:#0f0;
border:1px solid #0f0;
margin-top:5px;
}

.video{
padding:10px;
border-bottom:1px solid #033;
}

iframe{
width:100%;
height:200px;
border:0;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header" id="clock">--:--</div>

<!-- HOME -->
<div id="home" class="active">
<div class="menu">
<div onclick="openApp('yt')">📺 YouTube App</div>
<div onclick="goMaps()">📍 Maps</div>

<div>
🌐 Navegador
<input id="q" placeholder="Buscar o URL">
<button onclick="goSearch()">Buscar</button>
</div>

</div>
</div>

<!-- YOUTUBE APP -->
<div id="yt" class="screen">
<button onclick="home()">← Volver</button>

<h3>YouTube Ultra App</h3>

<input id="ytSearch" placeholder="Buscar videos">
<button onclick="searchYT()">Buscar</button>

<div id="results"></div>

<div id="player"></div>
</div>

<script>

/* reloj */
setInterval(function(){
var d=new Date();
document.getElementById("clock").innerHTML=
d.getHours()+":"+("0"+d.getMinutes()).slice(-2);
},1000);

/* navegación */
function openApp(id){
document.getElementById("home").style.display="none";
document.getElementById(id).style.display="block";
}

function home(){
document.getElementById("home").style.display="block";
document.getElementById("yt").style.display="none";
document.getElementById("player").innerHTML="";
}

/* MAPS */
function goMaps(){
location.href="https://www.google.com/maps?force=lite";
}

/* NAVEGADOR */
function goSearch(){
var q=document.getElementById("q").value;
if(!q) return;

var isURL = q.indexOf(".")>-1;

var url = isURL 
? (q.indexOf("http")===0?q:"https://"+q)
: "https://www.google.com/search?gbv=1&q="+encodeURIComponent(q);

location.href=url;
}

/* BUSCADOR YOUTUBE (SCRAP SIMPLE SIN AJAX MODERNO) */
function searchYT(){
var q=document.getElementById("ytSearch").value;
if(!q) return;

/* usamos página ligera */
var url = "https://m.youtube.com/results?search_query="+encodeURIComponent(q);

/* abrimos resultados en la misma vista */
location.href = url;
}

/* REPRODUCTOR ULTRA (cuando tengamos ID) */
function playVideo(id){
document.getElementById("player").innerHTML =
"<iframe src='https://www.youtube.com/embed/"+id+"'></iframe>";
}

</script>

</body>
</html>
