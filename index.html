<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iLegacy OS v9 Hybrid</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

/* HEADER */
.header{
    text-align:center;
    padding:10px;
    font-size:20px;
    border-bottom:1px solid #333;
}

/* GRID */
.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:10px;
}

.app{
    width:80px;
    margin:10px;
    text-align:center;
    font-size:12px;
    cursor:pointer;
}

.app div{
    width:50px;
    height:50px;
    margin:auto;
    background:#222;
    border-radius:10px;
    line-height:50px;
}

/* PANTALLAS */
.screen{
    display:none;
    padding:10px;
}

.active{
    display:block;
}

/* BOTON VOLVER */
.back{
    margin-bottom:10px;
    display:inline-block;
    padding:5px 10px;
    background:#333;
}

/* INPUT */
input, textarea{
    width:100%;
    padding:5px;
    margin-top:5px;
    background:#111;
    color:#fff;
    border:1px solid #333;
}
</style>
</head>

<body>

<div class="header" id="clock">00:00</div>

<!-- HOME -->
<div id="home" class="active">

<div class="grid">

<div class="app" onclick="openApp('youtube')">
<div>▶</div>YouTube
</div>

<div class="app" onclick="openApp('maps')">
<div>📍</div>Maps
</div>

<div class="app" onclick="openApp('facebook')">
<div>f</div>Facebook
</div>

<div class="app" onclick="openApp('browser')">
<div>🌐</div>Navegador
</div>

<div class="app" onclick="openApp('music')">
<div>♪</div>Música
</div>

<div class="app" onclick="openApp('notes')">
<div>✎</div>Notas
</div>

<div class="app" onclick="openApp('calc')">
<div>=</div>Calc
</div>

</div>
</div>

<!-- YOUTUBE -->
<div id="youtube" class="screen">
<div class="back" onclick="home()">← Volver</div>
<h3>YouTube Lite</h3>

<a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">▶ Video 1</a><br><br>
<a href="https://www.youtube.com/watch?v=ysz5S6PUM-U">▶ Video 2</a>

</div>

<!-- MAPS -->
<div id="maps" class="screen">
<div class="back" onclick="home()">← Volver</div>
<h3>Maps Lite</h3>

<input placeholder="Buscar lugar..." id="mapInput">
<button onclick="goMap()">Buscar</button>

</div>

<!-- FACEBOOK -->
<div id="facebook" class="screen">
<div class="back" onclick="home()">← Volver</div>
<h3>Facebook Lite</h3>

<a href="https://mbasic.facebook.com">Abrir Facebook</a>

</div>

<!-- BROWSER -->
<div id="browser" class="screen">
<div class="back" onclick="home()">← Volver</div>
<h3>Navegador</h3>

<input id="url" placeholder="Buscar o escribir URL">
<button onclick="go()">Ir</button>

</div>

<!-- MUSIC -->
<div id="music" class="screen">
<div class="back" onclick="home()">← Volver</div>
<h3>Música</h3>

<audio controls>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

</div>

<!-- NOTES -->
<div id="notes" class="screen">
<div class="back" onclick="home()">← Volver</div>
<h3>Notas</h3>

<textarea id="note"></textarea>
<button onclick="saveNote()">Guardar</button>

</div>

<!-- CALC -->
<div id="calc" class="screen">
<div class="back" onclick="home()">← Volver</div>
<h3>Calculadora</h3>

<input id="calcInput">
<button onclick="calc()">=</button>

<div id="result"></div>
</div>

<script>

// reloj
setInterval(function(){
    var d=new Date();
    document.getElementById("clock").innerHTML=
    d.getHours()+":"+("0"+d.getMinutes()).slice(-2);
},1000);

// navegación
function openApp(id){
    var s=document.getElementsByClassName("screen");
    for(var i=0;i<s.length;i++) s[i].style.display="none";
    document.getElementById("home").style.display="none";
    document.getElementById(id).style.display="block";
}

function home(){
    var s=document.getElementsByClassName("screen");
    for(var i=0;i<s.length;i++) s[i].style.display="none";
    document.getElementById("home").style.display="block";
}

// navegador
function go(){
    var url=document.getElementById("url").value;
    if(url.indexOf("http")!==0){
        url="https://www.google.com/search?gbv=1&q="+url;
    }
    location.href=url;
}

// maps
function goMap(){
    var q=document.getElementById("mapInput").value;
    location.href="https://www.google.com/maps?q="+q+"&force=lite";
}

// notas
function saveNote(){
    localStorage.setItem("note",document.getElementById("note").value);
}
document.getElementById("note").value=localStorage.getItem("note")||"";

// calculadora
function calc(){
    try{
        var r=eval(document.getElementById("calcInput").value);
        document.getElementById("result").innerHTML=r;
    }catch(e){
        document.getElementById("result").innerHTML="Error";
    }
}

</script>

</body>
</html>
