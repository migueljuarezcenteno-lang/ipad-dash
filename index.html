<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>iLegacy Web Ultra</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#0f0;
}

.header{
text-align:center;
padding:10px;
border-bottom:1px solid #0f0;
}

.menu div{
padding:15px;
border-bottom:1px solid #033;
}

input{
width:100%;
padding:10px;
background:#000;
color:#0f0;
border:1px solid #0f0;
}
</style>
</head>

<body>

<div class="header" id="clock">--:--</div>

<div class="menu">

<div onclick="goYouTube()">📺 YouTube</div>
<div onclick="goMaps()">📍 Maps</div>

<div>
🌐 Navegador
<input id="q" placeholder="Buscar o URL">
<div onclick="goSearch()">Buscar</div>
</div>

</div>

<script>

/* reloj */
setInterval(function(){
var d=new Date();
document.getElementById("clock").innerHTML=
d.getHours()+":"+("0"+d.getMinutes()).slice(-2);
},1000);

/* YOUTUBE CON MODOS */
function goYouTube(){
var mode = confirm("Modo ultra rápido (texto)?");
var q = prompt("Buscar en YouTube:");

if(!q) return;

if(mode){
location.href="https://textise.net/showtext.aspx?strURL=https://m.youtube.com/results?search_query="+q;
}else{
location.href="https://m.youtube.com/results?search_query="+q;
}
}

/* MAPS LITE */
function goMaps(){
location.href="https://www.google.com/maps?force=lite";
}

/* NAVEGADOR INTELIGENTE */
function goSearch(){
var q=document.getElementById("q").value;

if(!q) return;

/* detectar si es URL */
var isURL = q.indexOf(".") > -1;

/* preguntar modo */
var mode = confirm("Modo ultra rápido (proxy)?");

var url;

if(isURL){
url = q.indexOf("http")===0 ? q : "https://"+q;
}else{
url = "https://www.google.com/search?gbv=1&q="+q;
}

if(mode){
location.href="https://textise.net/showtext.aspx?strURL="+url;
}else{
location.href=url;
}
}

</script>

</body>
</html>
