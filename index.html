<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- MODO APP -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<!-- VIEWPORT BLOQUEADO -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">

<title>YouTube Turbo</title>

<style>
body{
background:#000;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
font-family:Arial;
}

/* pantalla limpia sin parpadeos */
.loader{
color:#ff0000;
font-size:14px;
opacity:0.9;
}
</style>

<!-- ⚡ PRE-CONEXIÓN (clave real) -->
<link rel="dns-prefetch" href="https://m.youtube.com">
<link rel="preconnect" href="https://m.youtube.com">

</head>

<body>

<div class="loader">Cargando modo turbo...</div>

<script>

/* 🚀 URL OPTIMIZADA */
var ytUrl = "https://m.youtube.com/?persist_app=1&app=m&noapp=1&hl=es";

/* ⚡ PRELOAD INVISIBLE */
var link = document.createElement("link");
link.rel = "prefetch";
link.href = ytUrl;
document.head.appendChild(link);

/* ⚡ REDIRECCIÓN ULTRA RÁPIDA */
setTimeout(function(){
window.location.replace(ytUrl);
}, 50);

/* 🔥 MODO APP (mantener dentro) */
(function(a, b, c) {
if (c in b && b[c]) {
var d, e = a.location, f = /^(a|html)$/i;
a.addEventListener("click", function(a) {
d = a.target;
while (!f.test(d.nodeName)) d = d.parentNode;
if ("href" in d && (d.href.indexOf("http") || ~d.href.indexOf(e.host))) {
a.preventDefault();
e.href = d.href;
}
}, false);
}
})(document, window.navigator, "standalone");

/* ⚡ BLOQUEAR RETROCESO (fluidez) */
history.pushState(null, null, location.href);
window.onpopstate = function () {
history.go(1);
};

</script>

</body>
</html>
