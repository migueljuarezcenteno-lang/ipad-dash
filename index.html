<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- MODO APP NATIVA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<!-- BLOQUEAR ZOOM Y REESCALADO -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">

<title>YouTube</title>

<style>
body{
background:#000;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
font-family:Arial;
}

.loader{
color:#ff0000;
font-size:16px;
}
</style>
</head>

<body>

<div class="loader">YouTube Lite iniciando...</div>

<script>

/* 🚀 URL ULTRA OPTIMIZADA */
var ytUrl = "https://m.youtube.com/?persist_app=1&app=m&noapp=1&hl=es";

/* ⚡ REDIRECCIÓN INMEDIATA (sin delay) */
window.location.replace(ytUrl);

/* 🔥 MANTENER EXPERIENCIA APP (standalone) */
(function(a, b, c) {
if (c in b && b[c]) {
var d, e = a.location, f = /^(a|html)$/i;
a.addEventListener("click", function(a) {
d = a.target;
while (!f.test(d.nodeName)) d = d.parentNode;
if ("href" in d && (d.href.indexOf("http") || ~d.href.indexOf(e.host))) {
a.preventDefault();
e.href = d.href;
}
}, false);
}
})(document, window.navigator, "standalone");

/* ⚡ OPTIMIZACIÓN EXTRA: evitar volver atrás */
history.pushState(null, null, location.href);
window.onpopstate = function () {
history.go(1);
};

</script>

</body>
</html>
